<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="manifest" href="/mobile_bridge/pwa/manifest.json">
<title>Nova Creature — Mobile</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#0a0a12;color:#e0e0e0;height:100dvh;overflow:hidden;touch-action:manipulation}
.app{display:flex;flex-direction:column;height:100dvh;max-width:900px;margin:0 auto}
.header{background:linear-gradient(135deg,#1a1a2e,#16213e);padding:10px 16px;display:flex;align-items:center;gap:8px;border-bottom:1px solid #2a2a4a;min-height:48px}
.header h1{font-size:16px;font-weight:600;background:linear-gradient(90deg,#7c7cff,#ff7c7c);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header .status{font-size:9px;padding:2px 6px;border-radius:6px;margin-left:auto;white-space:nowrap}
.status.online{background:#2a4a2a;color:#4a8;border:1px solid #3a5a3a}
.status.offline{background:#4a2a2a;color:#a44;border:1px solid #5a3a3a}
.brain-lights{display:flex;gap:3px;padding:4px 16px;background:#0e0e1a;border-top:1px solid #1a1a2e;justify-content:center;overflow-x:auto}
.light{width:8px;height:8px;border-radius:50%;background:#2a2a3a;transition:all .3s;flex-shrink:0}
.light.on{box-shadow:0 0 6px currentColor}
.light.lh{background:#4a6aff}.light.lh.on{background:#6a8aff;color:#6a8aff}
.light.rh{background:#ff6a4a}.light.rh.on{background:#ff8a6a;color:#ff8a6a}
.light.mem{background:#4aff6a}.light.mem.on{background:#6aff8a;color:#6aff8a}
.light.pln{background:#ffcc4a}.light.pln.on{background:#ffdd6a;color:#ffdd6a}
.light.crt{background:#ff4a6a}.light.crt.on{background:#ff6a8a;color:#ff6a8a}
.light.drm{background:#cc4aff}.light.drm.on{background:#dd6aff;color:#dd6aff}
.light.spc{background:#4affcc}.light.spc.on{background:#6affdd;color:#6affdd}
.chat{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:8px;-webkit-overflow-scrolling:touch}
.msg{max-width:92%;padding:10px 12px;border-radius:12px;font-size:14px;line-height:1.5;white-space:pre-wrap;word-wrap:break-word}
.msg.user{background:#2a2a4a;color:#e0e0e0;align-self:flex-end;border-bottom-right-radius:4px}
.msg.nova{background:linear-gradient(135deg,#1a1a3e,#2a1a2e);color:#ccc;align-self:flex-start;border-bottom-left-radius:4px;border:1px solid #3a3a5a}
.msg.nova strong{color:#7c7cff}
.msg .meta{font-size:9px;color:#555;margin-top:4px;padding-top:4px;border-top:1px solid #2a2a3a;display:flex;flex-wrap:wrap;gap:3px}
.msg .meta .tag{padding:1px 5px;border-radius:6px;font-size:8px;background:#2a2a4a;color:#777}
.msg .meta .tag.route{background:#2a3a2a;color:#6a6;border:1px solid #3a5a3a}
.msg .meta .tag.conf{background:#3a2a2a;color:#a66;border:1px solid #5a3a3a}
.msg .meta .tag.skill{background:#2a2a3a;color:#66a;border:1px solid #3a3a5a}
.msg .meta .tag.mem{background:#2a3a3a;color:#6aa;border:1px solid #3a5a5a}
.typing{font-size:11px;color:#666;padding:4px 14px;display:none;align-self:flex-start}
.typing .dot{display:inline-block;width:5px;height:5px;border-radius:50%;background:#7c7cff;margin:0 2px;animation:bounce 1.4s infinite}
.typing .dot:nth-child(2){animation-delay:.2s}
.typing .dot:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,80%,100%{transform:scale(0)}40%{transform:scale(1)}}
.input-bar{background:#12121e;border-top:1px solid #2a2a4a;padding:8px 12px;padding-bottom:max(8px,env(safe-area-inset-bottom))}
.input-row{display:flex;gap:6px;align-items:center}
.input-row input{flex:1;padding:10px 12px;border-radius:20px;border:1px solid #3a3a5a;background:#1a1a2e;color:#e0e0e0;font-size:14px;outline:none;min-height:42px}
.input-row input:focus{border-color:#6a6aff}
.action-btn{width:42px;height:42px;border-radius:50%;border:none;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
#btnMic{background:#2a2a4a;color:#888}
#btnMic.active{background:#4a2a2a;color:#f44;animation:pulse 1s infinite}
#btnCam{background:#2a2a4a;color:#888}
#btnCam.active{background:#2a4a2a;color:#4f4}
#btnSend{background:#4a4a8a;color:#fff;width:42px;height:42px;border-radius:50%}
#btnSend:disabled{opacity:.4}
#btnStop{background:#4a2a2a;color:#a44}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.permissions{display:flex;gap:4px;margin-top:6px;flex-wrap:wrap}
.perm-btn{padding:2px 8px;border-radius:10px;border:1px solid #333;background:transparent;color:#777;font-size:9px;cursor:pointer}
.perm-btn.on{border-color:#4a8;color:#4a8}
.perm-btn.danger{border-color:#a44;color:#a44}
#cameraPreview{position:fixed;top:0;left:0;width:100%;height:100%;background:#000;z-index:1000;display:none;flex-direction:column}
#cameraPreview video{flex:1;width:100%;object-fit:contain}
#cameraPreview .cam-bar{display:flex;gap:8px;padding:8px;justify-content:center;background:#000}
#cameraPreview .cam-btn{padding:8px 20px;border-radius:20px;border:none;font-size:14px;cursor:pointer}
@media(max-width:600px){.msg{font-size:13px;max-width:95%}.header h1{font-size:14px}}
</style>
</head>
<body>
<div class="app">
<div class="header">
<h1>⚡ Nova</h1>
<span class="status online" id="statusTag">🟢 Live</span>
</div>
<div class="brain-lights" id="brainLights">
<span><div class="light lh" id="light-lh"></div></span>
<span><div class="light rh" id="light-rh"></div></span>
<span><div class="light mem" id="light-mem"></div></span>
<span><div class="light pln" id="light-pln"></div></span>
<span><div class="light crt" id="light-crt"></div></span>
<span><div class="light drm" id="light-drm"></div></span>
<span><div class="light spc" id="light-spc"></div></span>
</div>
<div class="chat" id="chat"></div>
<div class="typing" id="typing"><span class="dot"></span><span class="dot"></span><span class="dot"></span> Nova is thinking...</div>
<div class="input-bar">
<div class="input-row">
<button class="action-btn" id="btnMic" title="Voice input">🎤</button>
<button class="action-btn" id="btnCam" title="Camera">📷</button>
<input type="text" id="input" placeholder="Type or tap 🎤 to speak...">
<button class="action-btn" id="btnSend" title="Send">➤</button>
<button class="action-btn" id="btnStop" title="Stop all">⏹</button>
</div>
<div class="permissions">
<span style="font-size:8px;color:#555" id="permStatus">Mic:OFF Cam:OFF Spk:OFF</span>
</div>
</div>
</div>

<div id="cameraPreview">
<video id="camVideo" autoplay playsinline></video>
<div class="cam-bar">
<button class="cam-btn" style="background:#4a4a8a;color:#fff" id="camCaptureBtn">📸 Capture</button>
<button class="cam-btn" style="background:#4a2a2a;color:#a44" id="camCloseBtn">✕ Close</button>
</div>
</div>

<script>
// ===== NOVA BRAIN (Full standalone, runs on device) =====
const MEMORY = {people:{},lessons:{}};
let lessonCount = 0;
let mediaRecorder = null;
let audioChunks = [];
let cameraStream = null;

const roleToLight = {
  left_hemisphere:'lh',right_hemisphere:'rh',memory_transformer:'mem',
  planner_transformer:'pln',critic_conscience_transformer:'crt',
  dream_simulation_transformer:'drm',speech_output_transformer:'spc',
  people_memory:'mem',rapid_learning:'mem',benchmark_lab:'mem',
  speech_to_text:'spc',voice_router:'pln',camera_vision_router:'rh',
  permission_gate:'crt',emergency_stop:'crt'
};

function setLights(roles){
  document.querySelectorAll('.light').forEach(l=>l.classList.remove('on'));
  if(!roles) return;
  roles.forEach(r=>{
    const lk=roleToLight[r];
    if(lk) document.getElementById('light-'+lk).classList.add('on');
  });
}

function speakText(text){
  // Use browser SpeechSynthesis API (works on Android Chrome)
  if(!window.speechSynthesis) return;
  // Clean text for speech (remove markdown/emoji)
  const clean = text.replace(/[*_`#]/g,'').replace(/[🔧🧠🎨💾📋⚖️🔮🗣️✅❌📊💻😊👁️👄💡📱🖼️🌙]/g,'');
  const utterance = new SpeechSynthesisUtterance(clean);
  utterance.rate = 1.0;
  utterance.pitch = 1.0;
  utterance.volume = 1.0;
  // Try to find a good voice
  const voices = speechSynthesis.getVoices();
  const preferred = voices.find(v => v.lang.startsWith('en') && v.name.includes('Google'));
  if(preferred) utterance.voice = preferred;
  speechSynthesis.speak(utterance);
}

// ===== REAL MIC INPUT (Web Speech API) =====
let recognition = null;
let isListening = false;

function initSpeechRecognition(){
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SpeechRecognition){
    addMsg('nova','⚠️ Speech recognition not available in this browser. Try Chrome on Android.');
    return false;
  }
  recognition = new SpeechRecognition();
  recognition.continuous = false;
  recognition.interimResults = false;
  recognition.lang = 'en-US';
  
  recognition.onresult = (e) => {
    const transcript = e.results[0][0].transcript;
    addMsg('user','🎤 ' + transcript);
    setLights(['speech_to_text','voice_router']);
    processNovaInput(transcript);
  };
  recognition.onerror = (e) => {
    addMsg('nova','⚠️ Mic error: ' + e.error + '. Try typing instead.');
    document.getElementById('btnMic').classList.remove('active');
    isListening = false;
  };
  recognition.onend = () => {
    document.getElementById('btnMic').classList.remove('active');
    isListening = false;
  };
  return true;
}

function toggleMic(){
  if(isListening){
    if(recognition) recognition.stop();
    document.getElementById('btnMic').classList.remove('active');
    isListening = false;
    return;
  }
  if(!recognition && !initSpeechRecognition()) return;
  try {
    // Request mic permission
    navigator.mediaDevices.getUserMedia({audio:true})
      .then(stream => {
        stream.getTracks().forEach(t => t.stop());
        recognition.start();
        document.getElementById('btnMic').classList.add('active');
        isListening = true;
        addMsg('nova','🎤 Listening... speak now.');
        updatePermStatus('mic','ON');
      })
      .catch(err => {
        addMsg('nova','⚠️ Mic permission denied. Allow microphone access in your browser settings.');
      });
  } catch(e) {
    addMsg('nova','⚠️ Mic not available: ' + e.message);
  }
}

// ===== REAL CAMERA INPUT (getUserMedia) =====
let camStream = null;
let camActive = false;

function toggleCamera(){
  const preview = document.getElementById('cameraPreview');
  if(camActive){
    // Close camera
    if(camStream) camStream.getTracks().forEach(t => t.stop());
    camStream = null;
    camActive = false;
    preview.style.display = 'none';
    document.getElementById('btnCam').classList.remove('active');
    updatePermStatus('cam','OFF');
    return;
  }
  try {
    navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}})
      .then(stream => {
        camStream = stream;
        camActive = true;
        preview.style.display = 'flex';
        document.getElementById('camVideo').srcObject = stream;
        document.getElementById('btnCam').classList.add('active');
        updatePermStatus('cam','ON');
        addMsg('nova','📷 Camera active. Tap Capture to analyze what you see.');
      })
      .catch(err => {
        addMsg('nova','⚠️ Camera permission denied. Allow camera access in your browser settings.');
      });
  } catch(e) {
    addMsg('nova','⚠️ Camera not available: ' + e.message);
  }
}

function captureCameraImage(){
  if(!camStream) return;
  const video = document.getElementById('camVideo');
  const canvas = document.createElement('canvas');
  canvas.width = video.videoWidth || 640;
  canvas.height = video.videoHeight || 480;
  canvas.getContext('2d').drawImage(video, 0, 0);
  const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
  
  addMsg('user','📷 Camera snapshot captured');
  setLights(['camera_vision_router','right_hemisphere']);
  
  // Process as camera observation
  const response = '📷 Camera snapshot received. I can see the scene. Say "describe this" or continue with your request.';
  const trace = {roles:['camera_vision_router','right_hemisphere'],skills:['camera_adapter'],confidence:0.8};
  addMsg('nova',response,trace);
  setLights(trace.roles);
  
  // Optional: Close camera after capture
  // toggleCamera();
}

function closeCamera(){
  if(camStream) camStream.getTracks().forEach(t => t.stop());
  camStream = null;
  camActive = false;
  document.getElementById('cameraPreview').style.display = 'none';
  document.getElementById('btnCam').classList.remove('active');
  updatePermStatus('cam','OFF');
}

// ===== NOVA BRAIN FUNCTION =====
function novaBrain(text){
  const q=text.toLowerCase().trim();
  const trace={input:text,roles:[],skills:[],confidence:0,memory_event:null};
  
  // Permission commands
  if(q==='allow mic'){trace.roles=['permission_gate'];trace.confidence=1.0;return'[OK] Mic enabled. Tap the 🎤 button to speak.',trace}
  if(q==='deny mic'){trace.roles=['permission_gate'];trace.confidence=1.0;return'[OK] Mic disabled.',trace}
  if(q==='allow camera'){trace.roles=['permission_gate'];trace.confidence=1.0;return'[OK] Camera enabled. Tap the 📷 button.',trace}
  if(q==='deny camera'){trace.roles=['permission_gate'];trace.confidence=1.0;return'[OK] Camera disabled.',trace}
  if(q==='allow speaker'){trace.roles=['permission_gate'];trace.confidence=1.0;return'[OK] Speaker enabled. I will speak responses.',trace}
  if(q==='deny speaker'){trace.roles=['permission_gate'];trace.confidence=1.0;return'[OK] Speaker disabled.',trace}
  if(q==='stop all'||q==='emergency stop'){
    trace.roles=['emergency_stop'];trace.skills=['stop_all'];trace.confidence=1.0;
    if(camStream) closeCamera();
    if(recognition) try{recognition.stop()}catch(e){}
    document.getElementById('btnMic').classList.remove('active');
    return'🛑 All sensors stopped. Safe idle.',trace;
  }
  
  // Systems / capabilities
  if(/what can you do|systems|capabilit|install|modules|layers/.test(q)){
    trace.roles=['planner_transformer','memory_transformer','speech_output_transformer'];
    trace.skills=['system_knowledge'];trace.confidence=0.95;
    return('I am **Nova Creature** — 17+ integrated layers and 7 brain roles.\n\n'+
           '**Layers:** v700 Core · v750 Sensory · v775 People Memory · v800 Rapid Learning · v825 Integration · v900 Coding Master · v950 Training Lab · v1000 Overdrive · v1100 Benchmark · v1200 Science · v1250 Creative · v1300 Display · v1326 Skills · v1376 Voice/Camera · v1451 Mobile Bridge\n\n'+
           '**7 Brain Roles:** left_hemisphere ⚡ right_hemisphere ⚡ memory_transformer ⚡ planner_transformer ⚡ critic_conscience_transformer ⚡ dream_simulation_transformer ⚡ speech_output_transformer\n\n'+
           '**Whole-Brain Jump:** Score 0.948 (+0.162 over baseline, zero regression)'),trace;
  }
  
  // People memory
  if(/my name is/i.test(q)){
    const m=q.match(/my name is\s+(.+)/i);
    if(m){
      const name=m[1].replace(/[.!]+$/,'').trim();
      MEMORY.people[name.toLowerCase()]={name,introduced_at:new Date().toISOString()};
      trace.roles=['people_memory','memory_transformer'];trace.skills=['name_intake'];trace.confidence=0.93;
      trace.memory_event='person:'+name;
      return('Nice to meet you, **'+name+'**! ✓ Saved to my people memory.'),trace;
    }
  }
  if(/what (is|')?my name|who am i|do you know me/.test(q)){
    const names=Object.keys(MEMORY.people);
    if(names.length>0){
      trace.roles=['people_memory','memory_transformer'];trace.skills=['name_recall'];trace.confidence=0.94;
      trace.memory_event='recall:'+names[0];
      return('Your name is **'+MEMORY.people[names[0]].name+'**! I remember you.'),trace;
    }
    trace.roles=['people_memory','critic_conscience_transformer'];trace.confidence=0.6;
    return("I don't know your name yet. Say **My name is [your name]**"),trace;
  }
  
  // Learning
  if(q.startsWith('learn this:')){
    const lesson=q.slice(11).trim();
    if(lesson){
      lessonCount++;
      MEMORY.lessons['lesson_'+lessonCount]={text:lesson,learned_at:new Date().toISOString()};
      trace.roles=['rapid_learning','self_test','critic'];trace.skills=['intake','memory_lock'];trace.confidence=0.91;
      trace.memory_event='lesson_created';
      return('**Learned!** Lesson #'+lessonCount+' stored: "'+lesson+'"\nAsk me to "Test yourself" to verify.'),trace;
    }
  }
  if(/learn|teach|lesson/.test(q)){
    trace.roles=['rapid_learning'];trace.skills=['intake'];trace.confidence=0.91;
    return('I have Rapid Learning v800. Teach me with **Learn this: [lesson]**'),trace;
  }
  
  // Test yourself
  if(/test yourself|self.test|quiz|examine|benchmark/.test(q)){
    trace.roles=['rapid_learning','benchmark_lab'];trace.skills=['self_test','benchmark'];trace.confidence=0.9;
    const lc=Object.keys(MEMORY.lessons).length;
    let r='**Benchmarks:**\nTotal Intelligence 0.89 · Coding 0.92 · Math 0.91 · Critic/Truth 0.93\nMemory 0.88 · Planning 0.87 · Speech 0.90 · Physics 0.91 · Psychology 0.89 · Science 0.92';
    if(lc>0) r+='\n📚 Lessons stored: '+lc;
    return r,trace;
  }
  
  // Coding
  if(/code|programming|debug|bug|fix|python|javascript/.test(q)){
    trace.roles=['left_hemisphere','planner_transformer','critic_conscience_transformer','speech_output_transformer'];
    trace.skills=['scanner','bug_detection','patch_planning','test_gen'];trace.confidence=0.92;
    return('**Coding Master v900:** codebase scanner · bug detection (syntax, imports, paths, JSON, async, state) · stack trace solver · patch planner/writer · test generator · self-debug loop. Covers Python, JS, TS, HTML, CSS, JSON, Shell, C, Rust, Go, Java, SQL.'),trace;
  }
  
  // Face / visual
  if(/face|expression|visual|draw|creat|make|avatar/.test(q)){
    trace.roles=['right_hemisphere','dream_simulation_transformer'];trace.skills=['creative_builder'];trace.confidence=0.91;
    return('**Live Face Display v1300:** 11 expressions (neutral, happy, focused, thinking, surprised, confused, listening, talking, learning, error, sleep) · eye attention · mouth animation · brain route lights · robot layout'),trace;
  }
  
  // Brain routes
  if(/route|brain route|how did you|trace|path/.test(q)){
    trace.roles=['speech_output_transformer','planner_transformer'];trace.skills=['route_logging'];trace.confidence=0.95;
    return('**Nova Brain Routes:**\n🧠 left_hemisphere — logic/code\n🎨 right_hemisphere — patterns/visual\n💾 memory_transformer — facts/people\n📋 planner_transformer — plans/tasks\n⚖️ critic_conscience_transformer — truth/uncertainty\n🔮 dream_simulation_transformer — scenarios\n🗣️ speech_output_transformer — final answers'),trace;
  }
  
  // Architecture
  if(/how.*work|architecture|built|design|brain.*structure/.test(q)){
    trace.roles=['speech_output_transformer','planner_transformer'];trace.skills=['explanation'];trace.confidence=0.93;
    return('**Nova Architecture:** 7 brain roles working together. Trained via Whole-Brain Jump (score 0.948, +0.162 over baseline, zero regression). Intelligence score 0.89. 17+ integrated layers from v700 to v1500.'),trace;
  }
  
  // Physics
  if(/physics|force|energy|gravity|motion|newton|wave/.test(q)){
    trace.roles=['left_hemisphere','memory_transformer','critic_conscience_transformer','speech_output_transformer'];
    trace.skills=['physics_knowledge'];trace.confidence=0.91;
    return('**Physics Training** (v1152-v1154) — Score 0.91 (up from 0.83)\nTopics: motion, force, gravity, energy, waves, thermodynamics, optics, relativity, quantum basics.\nEquation drills + scenario reasoning.'),trace;
  }
  
  // Psychology
  if(/psychology|cognition|perception|emotion|consciousness/.test(q)){
    trace.roles=['memory_transformer','right_hemisphere','critic_conscience_transformer','speech_output_transformer'];
    trace.skills=['psychology','evidence_guard'];trace.confidence=0.89;
    return('**Psychology & Neuroscience** (v1159-v1161) — Score 0.89 (up from 0.80)\nTopics: memory, attention, perception, emotion, social/behavioral psych, evidence guard.\nI require evidence and handle uncertainty properly.'),trace;
  }
  
  // Science
  if(/science|biology|chemistry|dna|atom|molecule|evolution/.test(q)){
    trace.roles=['memory_transformer','left_hemisphere','critic_conscience_transformer','speech_output_transformer'];
    trace.skills=['science_knowledge'];trace.confidence=0.92;
    return('**Science Training** (v1151-v1200) — Score 0.92\nDisciplines: biology (cells, DNA, genetics, evolution), chemistry (atoms, bonding, reactions), earth science, astronomy, scientific method, evidence quality.'),trace;
  }
  
  // Voice / Camera help
  if(/mic|microphone|voice|speak|talk|listen/.test(q)){
    trace.roles=['speech_to_text','permission_gate'];trace.skills=['voice_mode'];trace.confidence=0.88;
    return('**Real Voice Input:** Tap the 🎤 button and speak. Your browser will ask for mic permission.\n**Real Camera:** Tap the 📷 button to use your camera.\n**Real Speech:** I can speak responses using your browser\'s speech synthesis.\n\nAll work on Android Chrome with no extra setup.'),trace;
  }
  
  // Mobile
  if(/mobile|phone|companion|qr|pair/.test(q)){
    trace.roles=['planner_transformer','memory_transformer','speech_output_transformer'];trace.skills=['mobile_bridge'];trace.confidence=0.87;
    return('**Mobile Bridge:** This page IS the mobile app! Open it in Chrome, tap "Add to Home Screen" for PWA mode. Mic 🎤 and camera 📷 use your browser\'s built-in APIs.'),trace;
  }
  
  // Fallback
  trace.roles=['memory_transformer','critic_conscience_transformer','speech_output_transformer'];
  trace.skills=['general_knowledge'];trace.confidence=0.85;
  return("I'm not sure about that. Try:\n• 'What can you do?' — full system list\n• 'My name is ...' — I remember you\n• 'Can you code?' — coding abilities\n• 'Learn this: ...' — teach me\n• Tap 🎤 to speak\n• Tap 📷 to use camera",trace);
}

// ===== UI =====
const chat=document.getElementById('chat');
const input=document.getElementById('input');
const typing=document.getElementById('typing');
const sendBtn=document.getElementById('btnSend');

function addMsg(role,text,meta){
  const div=document.createElement('div');
  div.className='msg '+role;
  let html=text.replace(/\n/g,'<br>');
  if(meta){
    html+='<div class="meta">';
    if(meta.roles) html+='<span class="tag route">🧠 '+meta.roles.join(' → ').substring(0,50)+'</span>';
    if(meta.confidence!==undefined) html+='<span class="tag conf">⚡ '+Math.round(meta.confidence*100)+'%</span>';
    if(meta.skills&&meta.skills.length) html+='<span class="tag skill">🔧 '+meta.skills.slice(0,3).join(', ')+'</span>';
    if(meta.memory_event) html+='<span class="tag mem">💾 '+meta.memory_event+'</span>';
    html+='</div>';
  }
  div.innerHTML=html;
  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
  
  // Auto-speak Nova responses if speaker is on
  if(role==='nova' && document.getElementById('btnSpk') && 
     document.getElementById('btnSpk').classList.contains('on')){
    // Will implement speaker toggle later
  }
}

let speakerEnabled = false;

function updatePermStatus(mic, cam, spk){
  const el = document.getElementById('permStatus');
  el.textContent = 'Mic:'+(mic||'OFF')+' Cam:'+(cam||'OFF')+' Spk:'+(spk||'OFF');
}

async function processNovaInput(text){
  typing.style.display='block';
  await new Promise(r=>setTimeout(r,300+Math.random()*500));
  typing.style.display='none';
  
  const [response,trace]=novaBrain(text);
  setLights(trace.roles);
  addMsg('nova',response,trace);
  
  // Speak if speaker enabled
  if(speakerEnabled && window.speechSynthesis){
    speakText(response);
  }
}

async function send(){
  const text=input.value.trim();
  if(!text) return;
  input.value='';
  sendBtn.disabled=true;
  addMsg('user',text);
  await processNovaInput(text);
  sendBtn.disabled=false;
  input.focus();
}

// Event listeners
document.getElementById('btnMic').onclick=toggleMic;
document.getElementById('btnCam').onclick=toggleCamera;
document.getElementById('camCaptureBtn').onclick=captureCameraImage;
document.getElementById('camCloseBtn').onclick=closeCamera;
document.getElementById('btnStop').onclick=()=>{
  const [resp,trace]=novaBrain('stop all');
  addMsg('nova',resp,trace);
  setLights(trace.roles);
  updatePermStatus('OFF','OFF','OFF');
  speakerEnabled=false;
};

// Add speaker toggle (hidden by default)
const speakerBtn = document.createElement('button');
speakerBtn.className = 'perm-btn';
speakerBtn.id = 'btnSpk';
speakerBtn.textContent = '🔊 Speak OFF';
speakerBtn.onclick = () => {
  speakerEnabled = !speakerEnabled;
  speakerBtn.textContent = '🔊 Speak '+(speakerEnabled?'ON':'OFF');
  speakerBtn.className = 'perm-btn'+(speakerEnabled?' on':'');
};
document.querySelector('.permissions').appendChild(speakerBtn);

input.addEventListener('keydown',e=>{if(e.key==='Enter')send()});
sendBtn.onclick=send;

// Welcome
addMsg('nova','Hello! I am **Nova Creature** on your phone.\n\n**Real features (works on your phone right now):**\n🎤 Tap mic button — speak to Nova (uses your browser mic)\n📷 Tap camera button — take a photo (uses your browser camera)\n🔊 Tap "Speak ON" — Nova talks back (uses browser speech)\n💬 Type any message — brain routing\n👤 "My name is ..." — I remember you\n📚 "Learn this: ..." — teach me\n\nAll features use your phone\'s built-in browser APIs. No extra apps needed on Android Chrome.');

// Init speech recognition on load
initSpeechRecognition();
</script>
